name: my_first_app
description: "A new Flutter project for permission testing."

# 以下設定防止你不小心將套件發佈到 pub.dev
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # iOS 風格的圖標（選用，但建議保留）
  cupertino_icons: ^1.0.6
  
  # 這是處理定位與通知權限的核心套件
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  # 使用 Material Design 基礎組件
  uses-material-design: true

  # 如果你未來有圖片資產，會加在下面
  # assets:
  #   - images/