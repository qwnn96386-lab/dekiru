name: shop_radar_assistant
description: 自動偵測周邊店家並快速開啟行動支付與載具的行動助手。
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # 核心資料庫
  sqflite: ^2.3.3+1
  path: ^1.9.0
  # 核心定位與地理圍欄 (解決你報錯的關鍵)
  geofence_service: ^6.0.0+1
  # 硬體互動與 UI 工具
  permission_handler: ^11.3.1
  barcode_widget: ^2.0.4
  screen_brightness: ^1.0.1
  sensors_plus: ^5.0.1
  perfect_volume_control: ^1.0.0
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
