name: iOS_Pure_Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      # 關鍵步驟：在 pub get 之前，強行刪除 android 資料夾
      # 這樣 flutter tool 就會認定這是一個「純 iOS 專案」，不再檢查 Android Embedding
      - name: Pure iOS Environment Setup
        run: |
          rm -rf android
          flutter create --platforms ios .

      - name: Install Dependencies
        run: flutter pub get

      # 執行 iOS 編譯
      # --no-codesign 讓編譯在 GitHub 不需要憑證也能產出完整 Runner.app
      - name: Build iOS
        run: |
          cd ios
          pod repo update
          cd ..
          flutter build ios --release --no-codesign

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ios-radar-app
          path: build/ios/iphoneos/Runner.app
