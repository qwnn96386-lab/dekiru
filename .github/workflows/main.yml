name: iOS_Pure_Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Fix Paths and Environment
        run: |
          # 1. 物理刪除 Android (你不需要它)
          rm -rf android
          
          # 2. 【核心動作】刪除所有紀錄了 E 槽路徑的暫存設定檔
          # 這些檔案被刪除後，Flutter 會被迫重新抓取當前 Mac 的路徑
          rm -f ios/Flutter/*.xcconfig
          rm -f ios/Flutter/flutter_export_environment.sh
          
          # 3. 刪除導致 Swift 報錯的檔案
          rm -f ios/Runner/SceneDelegate.swift
          
          # 4. 強制重新配置 (這會修復 Podfile 與 podhelper 的連結)
          flutter create --platforms ios .
          flutter pub get

      - name: Build iOS Simulator
        run: |
          cd ios
          # 重新安裝 Pods，此時 podhelper 已經會指向正確的 Mac 路徑
          pod install --repo-update
          cd ..
          # 編譯模擬器版，保證功能不遺漏
          flutter build ios --simulator --debug --no-codesign

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ios-radar-app
          path: build/ios/iphonesimulator/Runner.app
