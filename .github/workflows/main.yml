name: iOS_Pure_Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Pure iOS Environment Setup
        run: |
          rm -rf android
          # 強制重新生成 iOS 專案結構，確保環境純淨
          flutter create --platforms ios .

      - name: Install Dependencies
        run: flutter pub get

      - name: Build iOS (Simulator version)
        run: |
          cd ios
          pod repo update
          # 這裡我們不跑 pod install，讓 flutter build 自動處理
          cd ..
          # 關鍵修改：編譯模擬器版本，不需要 Apple 簽章也能成功
          flutter build ios --simulator --debug

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ios-radar-app
          # 模擬器編譯出的路徑與實機不同，這裡要改
          path: build/ios/iphonesimulator/Runner.app
