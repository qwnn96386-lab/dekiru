name: iOS_Pure_Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Environment Clean
        run: |
          # 強制移除所有可能殘留 Windows 路徑的檔案
          rm -rf android
          rm -f ios/Flutter/Generated.xcconfig
          rm -f ios/Flutter/flutter_export_environment.sh
          # 讓 Flutter 根據目前的 macOS 環境重新產生專案檔
          flutter create --platforms ios .

      - name: Install Dependencies
        run: flutter pub get

      - name: Build iOS Simulator
        run: |
          cd ios
          # 這裡會重新生成正確的 podhelper 連結
          pod install --repo-update
          cd ..
          flutter build ios --simulator --debug --no-codesign

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ios-radar-app
          path: build/ios/iphonesimulator/Runner.app
