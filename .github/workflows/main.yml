name: "iOS 純享版完整編譯"

on:
  push:
    branches: [ main, master ]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      # 1. 檢出程式碼
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 設定 Flutter 環境 (建議 3.19.0)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      # 3. 執行清理並安裝套件 (此時不會報 Android 錯誤)
      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get

      # 4. iOS 橋接與 CocoaPods (確保你的支付跳轉白名單生效)
      - name: Install CocoaPods
        run: |
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          # 強制清理 CocoaPods 緩存並更新
          pod install --repo-update
          cd ..

      # 5. 編譯 iOS (不檢查 Android 簽署)
      - name: Build iOS IPA
        run: flutter build ios --release --no-codesign

      # 6. 收集成品
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-radar-app
