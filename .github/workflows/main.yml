name: "iOS 完整編譯驗證"

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-ios:
    # 必須在 macOS 環境下編譯 iOS
    runs-on: macos-latest
    
    steps:
      # 1. 檢出程式碼
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 設定 Flutter 環境 (配合你的 pubspec.yaml 版本)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # 建議使用穩定版本
          channel: 'stable'
          cache: true

      # 3. 安裝 Dart 依賴套件
      - name: Install dependencies
        run: flutter pub get

      # 4. 安裝 CocoaPods (處理 iOS 原生橋接關鍵)
      # 此步驟會根據你的 Podfile 自動處理 PERMISSION_LOCATION=1 等設定
      - name: Install CocoaPods
        run: |
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          pod install --repo-update
          cd ..

      # 5. 執行 iOS 編譯
      # 使用 --no-codesign 確保在沒有 Apple 憑證的 GitHub 環境也能產出編譯檔
      # build ios 會自動檢查 Info.plist 並打包所有 Assets 與 Code
      - name: Build iOS IPA
        run: flutter build ios --release --no-codesign

      # 6. 收集編譯結果 (上傳至 GitHub Artifacts)
      # 這樣你可以在 GitHub Actions 頁面下載編譯好的 Runner.app
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-app
          path: build/ios/iphoneos/Runner.app
