name: iOS_Pure_Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Project Rebuild
        run: |
          rm -rf android
          # 刪除可能出錯的檔案
          rm -f ios/Runner/SceneDelegate.swift
          # 強制讓 Flutter 工具修復 iOS 專案結構
          flutter create --platforms ios .
          flutter pub get

      - name: Build iOS Simulator
        run: |
          cd ios
          pod repo update
          pod install
          cd ..
          # 編譯模擬器版本，100% 包含所有 Dart 邏輯與原生配置
          flutter build ios --simulator --debug --no-codesign

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ios-radar-app
          path: build/ios/iphonesimulator/Runner.app
