name: iOS_Pure_Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Fix Environment and Paths
        run: |
          # 1. 物理刪除 Android
          rm -rf android
          
          # 2. 徹底清除 Windows E 槽路徑殘留
          rm -f ios/Flutter/*.xcconfig
          rm -f ios/Flutter/flutter_export_environment.sh
          
          # 3. 【核心修正】如果 SceneDelegate 檔案不見了，幫它建一個最簡版的
          # 這樣可以解決 "Build input file cannot be found" 的報錯
          mkdir -p ios/Runner
          if [ ! -f ios/Runner/SceneDelegate.swift ]; then
            cat <<EOF > ios/Runner/SceneDelegate.swift
          import UIKit
          import Flutter
          class SceneDelegate: UIResponder, UIWindowSceneDelegate { var window: UIWindow? }
          EOF
          fi

          # 4. 讓 Flutter 根據 Mac 環境重新配置
          flutter create --platforms ios .
          flutter pub get

      - name: Build iOS Simulator
        run: |
          cd ios
          pod repo update
          pod install
          cd ..
          # 編譯模擬器版，保證功能 100% 編入
          flutter build ios --simulator --debug --no-codesign

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ios-radar-app
          path: build/ios/iphonesimulator/Runner.app
